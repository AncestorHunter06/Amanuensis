name: Move PR to In Progress on Open
on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  repository_projects: write

jobs:
  move-linked-issues-to-in-progress:
    name: Move linked issues to In Progress (Projects V2)
    runs-on: ubuntu-latest
    steps:
      - name: Parse PR and move linked issues in Projects V2
        uses: actions/github-script@v6
        with:
          script: |
            const projectOwner = "AncestorHunter06";
            const projectNumber = 4; // from https://github.com/users/AncestorHunter06/projects/4
            const statusTarget = ["In Progress", "In progress", "InProgress"]; // try a few variants

            // Get PR info from context
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("This run is not a pull_request event or missing payload.pull_request");
              return;
            }
            const prBody = pr.body || "";
            core.info(`PR #${pr.number} detected. Parsing body for issue references.`);

            // Find referenced issue numbers like #123
            const issueNums = Array.from(prBody.matchAll(/#(\d+)/g)).map(m => parseInt(m[1], 10));
            if (issueNums.length === 0) {
              core.info("No issue references found in the PR body. Nothing to move.");
              return;
            }
            core.info(`Found referenced issue numbers: ${issueNums.join(", ")}`);

            // Get Project V2 id and fields (user-level project)
            const projectQuery = `
              query($owner:String!, $number:Int!) {
                user(login:$owner) {
                  projectV2(number:$number) {
                    id
                    title
                    fields(first:50) {
                      nodes {
                        id
                        name
                        settings
                      }
                    }
                  }
                }
              }
            `;
            const projectRes = await github.graphql(projectQuery, {
              owner: projectOwner,
              number: projectNumber
            }).catch(err => {
              core.error("Failed to fetch projectV2: " + err.message);
              throw err;
            });

            const project = projectRes?.user?.projectV2;
            if (!project) {
              throw new Error(`Project V2 number ${projectNumber} for user ${projectOwner} not found.`);
            }
            core.info(`Working with Project V2: ${project.title} (${project.id})`);

            // Find the Status field in the project's fields and parse options from settings
            const fields = project.fields.nodes;
            const statusField = fields.find(f => /status/i.test(f.name));
            if (!statusField) {
              throw new Error("No field named Status (or similar) found in the project. The workflow expects a Status field to set to 'In Progress'.");
            }
            core.info(`Found status field: ${statusField.name} (${statusField.id})`);

            let options = [];
            try {
              options = JSON.parse(statusField.settings || "{}").options || [];
            } catch (e) {
              core.warning("Could not parse settings for the status field; settings may be empty or unexpected.");
            }
            // Find matching option id for statusTarget
            let optionId = null;
            for (const candidate of statusTarget) {
              const opt = options.find(o => String(o.name).toLowerCase() === String(candidate).toLowerCase());
              if (opt) {
                optionId = opt.id;
                core.info(`Using status option '${opt.name}' (id=${opt.id})`);
                break;
              }
            }
            if (!optionId) {
              core.warning(`Could not find a matching Status option for ${statusTarget.join(", ")}. The workflow will still add items but won't set the Status field.`);
            }

            // Helper to get the issue Node ID
            async function getIssueNodeId(owner, repo, number) {
              const q = `
                query($owner:String!, $repo:String!, $number:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$number) {
                      id
                    }
                  }
                }`;
              const r = await github.graphql(q, { owner: context.repo.owner, repo: context.repo.repo, number });
              return r?.repository?.issue?.id || null;
            }

            // For each referenced issue, add it to the project and set the status field
            for (const issueNumber of issueNums) {
              try {
                core.info(`Processing issue #${issueNumber}...`);
                const contentId = await getIssueNodeId(context.repo.owner, context.repo.repo, issueNumber);
                if (!contentId) {
                  core.warning(`Issue #${issueNumber} not found in repository ${context.repo.owner}/${context.repo.repo}. Skipping.`);
                  continue;
                }

                // Add issue as a Project V2 item
                const addMutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                      item {
                        id
                      }
                    }
                  }
                `;
                const addRes = await github.graphql(addMutation, {
                  projectId: project.id,
                  contentId
                }).catch(e => {
                  // If item already exists, GraphQL may return an error; we can try to find existing item
                  core.warning(`addProjectV2ItemById failed for issue #${issueNumber}: ${e.message}`);
                  return null;
                });

                let itemId = addRes?.addProjectV2ItemById?.item?.id || null;
                if (!itemId) {
                  // Try to find existing item for the content
                  core.info("Attempting to find existing project item for the content...");
                  const findQuery = `
                    query($projectId: ID!, $contentId: ID!) {
                      node(id:$projectId) {
                        ... on ProjectV2 {
                          items(first:100) {
                            nodes {
                              id
                              content {
                                ... on Issue {
                                  id
                                  number
                                }
                                ... on PullRequest {
                                  id
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  const findRes = await github.graphql(findQuery, { projectId: project.id, contentId }).catch(e => {
                    core.warning("Failed to list project items: " + e.message);
                    return null;
                  });
                  const items = findRes?.node?.items?.nodes || [];
                  const match = items.find(n => n.content?.id === contentId);
                  if (match) {
                    itemId = match.id;
                    core.info(`Found existing project item ${itemId} for issue #${issueNumber}`);
                  } else {
                    core.warning(`Could not add or find a project item for issue #${issueNumber}`);
                    continue;
                  }
                } else {
                  core.info(`Created project item ${itemId} for issue #${issueNumber}`);
                }

                // If we have a status option id, set the project's Status field to that option
                if (optionId) {
                  const updateMutation = `
                    mutation($itemId: ID!, $fieldId: ID!, $optionId: ID!) {
                      updateProjectV2ItemFieldValue(input: {
                        itemId: $itemId,
                        fieldId: $fieldId,
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item {
                          id
                        }
                      }
                    }
                  `;
                  await github.graphql(updateMutation, {
                    itemId,
                    fieldId: statusField.id,
                    optionId
                  }).then(() => {
                    core.info(`Set Status to 'In Progress' for project item ${itemId}`);
                  }).catch(e => {
                    core.warning(`Failed to update Status field for item ${itemId}: ${e.message}`);
                  });
                }
              } catch (error) {
                core.error(`Error while handling issue #${issueNumber}: ${error.message}`);
              }
            }

            core.info("Done processing referenced issues.");
