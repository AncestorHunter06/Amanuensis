name: Move PR to In Progress on Open
on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  projects: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: github/add-to-project@v2
        with:
          project-url: https://github.com/AncestorHunter06/Amanuensis/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          status: In Progress
